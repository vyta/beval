name: Conformance

on:
  push:
    paths:
      - "spec/**"
      - "conformance/**"
      - "python/**"
      - "typescript/**"
      - "go/**"
      - "dotnet/**"
  pull_request:
    paths:
      - "spec/**"
      - "conformance/**"
      - "python/**"
      - "typescript/**"
      - "go/**"
      - "dotnet/**"

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd python && uv sync

      - name: Run conformance tests
        # TypeScript, Go, and .NET implementations are stubs that do not yet
        # pass the conformance fixtures. Restrict to Python until they reach
        # feature parity. See be1fc1a for context.
        run: CONTAINER_RUNTIME=docker ./conformance/runner.sh --languages python
