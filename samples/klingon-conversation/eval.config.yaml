eval:
  mode: validation
  thresholds:
    pass_score: 0.6
    case_pass_rate: 0.7
    turn_pass_rate: 0.7
    conversation_pass_rate: 0.8
    min_satisfaction: 0.7
    run_pass_rate: 0.9
    

  agents:
    default: klingon-tutor
    definitions:
      - name: klingon-tutor
        description: >
          Klingon language tutor via A2A HTTP.
          Run with: cd samples/klingon-agent && python server.py --port 8000
        protocol: a2a
        connection:
          url: ${AGENT_URL:-http://127.0.0.1:8000}
          streaming: false
        timeout: 60
        retry:
          max_attempts: 2
          backoff: 3.0

  judge:
    protocol: openai
    model: ${FOUNDRY_MODEL:-o4-mini}
    base_url: ${FOUNDRY_ENDPOINT}   # https://<resource>.services.ai.azure.com/api/projects/<project>/openai/v1
    auth: entra_id
    timeout: 60

  conversation:
    simulator:
      protocol: openai
      model: ${FOUNDRY_MODEL:-o4-mini}
      base_url: ${FOUNDRY_ENDPOINT}   # https://<resource>.services.ai.azure.com/api/projects/<project>/openai/v1
      auth: entra_id
      timeout: 60
      max_dynamic_criteria_per_turn: 0

    personas:
      - file: personas.yaml

    goals:
      - file: goals.yaml

    criteria:
      - file: criteria.yaml

    feedback_text_rate: 1
    actor_count: 2
    max_parallel_actors: 6
    max_turns: 15
    timeout_seconds: 600
    history_dir: .beval_history
    history_retention_days: 30

  output:
    dir: results
    format: json
