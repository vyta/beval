name: Conformance

on:
  push:
    paths:
      - "spec/**"
      - "conformance/**"
      - "python/**"
      - "typescript/**"
      - "go/**"
      - "dotnet/**"
  pull_request:
    paths:
      - "spec/**"
      - "conformance/**"
      - "python/**"
      - "typescript/**"
      - "go/**"
      - "dotnet/**"

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: |
          pip install -e "./python"
          cd typescript && npm ci && cd ..
          cd go && go build ./... && cd ..
          cd dotnet && dotnet build

      - name: Run conformance tests
        run: ./conformance/runner.sh
