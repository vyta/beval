cases:
  - name: Threshold override test
    id: threshold_override
    category: search
    given:
      query: "Define entropy"
    when: "the system answers"
    grades:
      - criterion: "answer is relevant"
        score: 1.0
        metric: relevance
        layer: deterministic
        passed: true
        detail: "relevant"
      - criterion: "answer provides depth"
        score: 0.0
        metric: correctness
        layer: deterministic
        passed: false
        detail: "shallow answer"
