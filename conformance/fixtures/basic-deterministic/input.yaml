cases:
  - name: Basic score aggregation
    id: basic_score_aggregation
    category: search
    given:
      query: "What is the capital of France?"
    when: "the system answers the question"
    grades:
      - criterion: "answer contains keyword"
        score: 1.0
        metric: relevance
        layer: deterministic
        passed: true
        detail: "keyword found"
      - criterion: "response time acceptable"
        score: 1.0
        metric: latency
        layer: deterministic
        passed: true
        detail: "within threshold"
